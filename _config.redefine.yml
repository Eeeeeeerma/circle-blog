# ============================================
# 桜の栞 — Redefine Theme Config
# 简洁、干净、专注于内容
# ============================================

info:
  title: CiRCLE
  subtitle: 在樱花树下，收藏生活的每一页
  author: Lock
  url: https://eeeerma.github.io/circle-blog

defaults:
  favicon:
  logo:
  avatar: /images/avatar.png

# 主色调 — 用了一个沉稳的蓝灰色
colors:
  primary: "#4A6A8A"
  default_mode: light

global:
  content_max_width: 750px
  sidebar_width: 200px
  hover:
    shadow: true
    scale: false
  scroll_progress:
    bar: true
    percentage: false
  website_counter:
    enable: false
  single_page: true
  preloader:
    enable: true
  side_tools:
    gear_rotation: false
    auto_expand: false
  open_graph:
    enable: true
    description: 在樱花树下，收藏生活的每一页

# 首页横幅 — 简洁大方
home_banner:
  enable: true
  style: fixed
  image:
    light: /images/home-bg.jpg
    dark: /images/home-bg.jpg
  title: CiRCLE
  subtitle:
    text:
      - 安静写字的地方
      - 记录思考、技术与日常
      - 一期一会
    typing_speed: 100
    backing_speed: 60
    loop: true
    smart_backspace: true
  text_color:
    light: "#fff"
    dark: "#d1d1b6"
  text_style:
    title_size: 2.6rem
    subtitle_size: 1.3rem
    line_height: 1.4
  social_links:
    enable: false

# 导航栏
navbar:
  auto_hide: false
  color:
    left: "#4A6A8A"
    right: "#6B8DB5"
    transparency: 35
  width:
    home: 1000px
    pages: 850px
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    归档:
      path: /archives
      icon: fa-regular fa-archive
    分类:
      path: /categories
      icon: fa-regular fa-folder
    标签:
      path: /tags
      icon: fa-regular fa-tags
    27考研:
      path: /kaoyan
      icon: fa-regular fa-calendar
    关于:
      path: /about
      icon: fa-regular fa-user

# 首页文章区
home:
  sidebar:
    enable: true
    position: left
    first_item: menu
    announcement: 安静写字的地方 🌿
    show_on_mobile: false
    links:
      归档:
        path: /archives
        icon: fa-regular fa-archive
      标签:
        path: /tags
        icon: fa-regular fa-tags
      分类:
        path: /categories
        icon: fa-regular fa-folder
  article_date_format: auto
  excerpt_length: 200
  categories:
    enable: true
    limit: 3
  tags:
    enable: true
    limit: 3

# 文章排版
articles:
  style:
    font_size: 16px
    line_height: 1.8
    image_border_radius: 12px
    image_alignment: center
    image_caption: false
    link_icon: true
    delete_mask: false
    title_alignment: left
  word_count:
    enable: true
    count: true
    min2read: true
  author_label:
    enable: false
  code_block:
    copy: true
    style: mac
    highlight_theme:
      light: github
      dark: vs2015
  toc:
    enable: true
    max_depth: 3
    number: false
    expand: true
    init_open: true
  copyright:
    enable: true
    default: cc_by_nc_sa
  lazyload: true
  pangu_js: false

# 页脚
footer:
  enable: true
  since: 2026
  powered:
    enable: false
  theme:
    enable: false
  custom:

# 评论（关闭）
comment:
  enable: false

# 注入自定义 CSS / JS
inject:
  enable: true
  head:
    - '<link rel="stylesheet" href="/css/custom.css">'
  footer:
    - |
      <style>
      /* 文章卡片纯色背景 — 在页面末尾注入，覆盖主题内联样式 */
      .home-article-item, .sidebar-links, .sidebar-content,
      a.page-number, a.extend, .right-bottom-tools, footer.footer {
        background-color: var(--background-color) !important;
      }
      .dark .home-article-item, .dark .sidebar-links, .dark .sidebar-content,
      .dark a.page-number, .dark a.extend, .dark .right-bottom-tools, .dark footer.footer {
        background-color: var(--background-color) !important;
      }
      </style>
